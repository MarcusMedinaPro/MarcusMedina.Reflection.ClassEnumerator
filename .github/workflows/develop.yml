name: 🧪 Develop - Unit Tests Only

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore csharp/MMPClassEnumerator.slnx

      - name: Build
        run: dotnet build csharp/MMPClassEnumerator.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test csharp/MMPClassEnumerator.slnx --configuration Release --no-build --verbosity normal --logger trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'
