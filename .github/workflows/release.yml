name: 🚀 Release - Full Pipeline

on:
  push:
    tags: ["v*"]
    branches: [release, main]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  packages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: 1️⃣ Build & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore csharp/MMPClassEnumerator.slnx

      - name: Build
        run: dotnet build csharp/MMPClassEnumerator.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test csharp/MMPClassEnumerator.slnx --configuration Release --no-build --verbosity normal --logger trx

      - name: Pack
        run: dotnet pack csharp/src/MMPClassEnumerator/MMPClassEnumerator.csproj --configuration Release --no-build --output ./nupkgs

      - name: Upload unsigned packages
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-packages
          path: ./nupkgs/*.nupkg

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'

  quality-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: 2️⃣ Code Quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore csharp/MMPClassEnumerator.slnx

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: dotnet build csharp/MMPClassEnumerator.slnx --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Dependency Vulnerability Scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
        continue-on-error: true

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: vulnerability-report.txt

  package-signing:
    needs: quality-gate
    runs-on: ubuntu-latest
    name: 3️⃣ Package Signing
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download unsigned packages
        uses: actions/download-artifact@v4
        with:
          name: unsigned-packages
          path: ./unsigned

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign packages
        run: |
          for pkg in ./unsigned/*.nupkg; do
            cosign sign-blob "$pkg" \
              --bundle "${pkg}.sigstore.json" \
              --yes
          done

      - name: Generate SHA256 checksums
        run: |
          cd unsigned
          sha256sum *.nupkg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload signed packages
        uses: actions/upload-artifact@v4
        with:
          name: signed-packages
          path: |
            ./unsigned/*.nupkg
            ./unsigned/*.sigstore.json
            ./unsigned/SHA256SUMS.txt

  publish-nuget:
    needs: package-signing
    runs-on: ubuntu-latest
    name: 4️⃣ Publish to NuGet.org
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download signed packages
        uses: actions/download-artifact@v4
        with:
          name: signed-packages
          path: ./packages

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./packages/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./packages/*.nupkg
            ./packages/*.sigstore.json
            ./packages/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
