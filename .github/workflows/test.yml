name: 🔍 Test - Unit Tests + Code Quality

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: 1️⃣ Build & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore csharp/MMPClassEnumerator.slnx

      - name: Build
        run: dotnet build csharp/MMPClassEnumerator.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test csharp/MMPClassEnumerator.slnx --configuration Release --no-build --verbosity normal --logger trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'

  quality-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: 2️⃣ Code Quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore csharp/MMPClassEnumerator.slnx

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: dotnet build csharp/MMPClassEnumerator.slnx --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Dependency Vulnerability Scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
        continue-on-error: true

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: vulnerability-report.txt
